<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chest Predictor</title>
    <!-- Set the theme before first paint so there is no flash of the wrong theme.
         Must mirror resolveTheme() in src/app/theme.ts (same key + dark fallback). -->
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("theme");
          document.documentElement.dataset.theme =
            stored === "light" || stored === "dark"
              ? stored
              : matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
        } catch {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-DEdYTH26.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-PAdjT4w6.css">
  </head>

    <div id="root"></div>
  </body>
</html>
